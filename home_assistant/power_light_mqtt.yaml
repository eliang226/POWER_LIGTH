# Home Assistant MQTT config example for POWER_LIGHT_V1.0 (bench test)
# Add this file content into your Home Assistant configuration (split packages or configuration.yaml).

mqtt:
  sensor:
    - name: "Power Light Voltaje AC"
      unique_id: power_light_v1_banco_pzem_v
      state_topic: "home/power_light_v1_banco/telemetry"
      value_template: "{% if value_json.pzem_valid %}{{ value_json.pzem_v }}{% else %}unknown{% endif %}"
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      availability_topic: "home/power_light_v1_banco/status"
      payload_available: "online"
      payload_not_available: "offline"

    - name: "Power Light Corriente AC"
      unique_id: power_light_v1_banco_pzem_a
      state_topic: "home/power_light_v1_banco/telemetry"
      value_template: "{% if value_json.pzem_valid %}{{ value_json.pzem_a }}{% else %}unknown{% endif %}"
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      availability_topic: "home/power_light_v1_banco/status"
      payload_available: "online"
      payload_not_available: "offline"

    - name: "Power Light Potencia AC"
      unique_id: power_light_v1_banco_pzem_w
      state_topic: "home/power_light_v1_banco/telemetry"
      value_template: "{% if value_json.pzem_valid %}{{ value_json.pzem_w }}{% else %}unknown{% endif %}"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      availability_topic: "home/power_light_v1_banco/status"
      payload_available: "online"
      payload_not_available: "offline"

    - name: "Power Light Voltaje Bateria"
      unique_id: power_light_v1_banco_bat_v
      state_topic: "home/power_light_v1_banco/telemetry"
      value_template: "{{ value_json.bat_v }}"
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      availability_topic: "home/power_light_v1_banco/status"
      payload_available: "online"
      payload_not_available: "offline"

    - name: "Power Light Corriente Bateria"
      unique_id: power_light_v1_banco_bat_a
      state_topic: "home/power_light_v1_banco/telemetry"
      value_template: "{{ value_json.bat_a }}"
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      availability_topic: "home/power_light_v1_banco/status"
      payload_available: "online"
      payload_not_available: "offline"

    - name: "Power Light Capacidad Bateria"
      unique_id: power_light_v1_banco_bat_cap
      state_topic: "home/power_light_v1_banco/telemetry"
      value_template: "{{ value_json.bat_cap }}"
      unit_of_measurement: "%"
      device_class: battery
      state_class: measurement
      availability_topic: "home/power_light_v1_banco/status"
      payload_available: "online"
      payload_not_available: "offline"

    - name: "Power Light Evento"
      unique_id: power_light_v1_banco_last_event
      state_topic: "home/power_light_v1_banco/alert"
      value_template: "{{ value_json.event }}"
      availability_topic: "home/power_light_v1_banco/status"
      payload_available: "online"
      payload_not_available: "offline"

  binary_sensor:
    - name: "Power Light Linea 1"
      unique_id: power_light_v1_banco_line1_ac
      state_topic: "home/power_light_v1_banco/telemetry"
      value_template: "{{ 'ON' if value_json.line1_ac else 'OFF' }}"
      payload_on: "ON"
      payload_off: "OFF"
      device_class: power
      availability_topic: "home/power_light_v1_banco/status"
      payload_available: "online"
      payload_not_available: "offline"

automation:
  - alias: "Power Light Alerta Linea 1"
    mode: queued
    trigger:
      - platform: mqtt
        topic: "home/power_light_v1_banco/alert"
    action:
      - service: persistent_notification.create
        data:
          title: "POWER LIGHT"
          message: >-
            Evento: {{ trigger.payload_json.event }}
