; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
cache_dir = .pio/cache
packages_dir = .pio/packages
platforms_dir = .pio/platforms

[env:seeed_xiao_esp32_c6]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git#00db4364eb71ed8cc6c893b0c1417cef6de77423
board = seeed-xiao-esp32-c6
framework = arduino
monitor_speed = 115200
monitor_eol = LF
monitor_encoding = UTF-8
platform_packages = 
	tool-esptoolpy@https://files.seeedstudio.com/arduino/platformio/esptoolpy-v5.1.2.zip
lib_deps = 
	adafruit/Adafruit NeoPixel@^1.15.4
	mandulaj/PZEM-004T-v30@^1.1.2
	marcoschwartz/LiquidCrystal_I2C@^1.1.4
	knolleary/PubSubClient@^2.8
